name: ultramemory
version: 1.9.11
description: "UltraMemory — one memory for every AI you use: Claude, ChatGPT, Perplexity, Gemini, Cursor, OpenClaw, Hermes, and any MCP client. Auto-injects grounded recall before each turn (abstains instead of guessing), captures durable facts (rich cards + atoms), mirrors the built-in memory tool, preserves facts across compression, and consolidates server-side. One API key = your own private tenant."
pip_dependencies:
  - httpx
